<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Finder (test)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    .controls { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    input { flex: 1; padding: .6rem; font-size: 1rem; }
    button { padding: .6rem 1.2rem; font-size: 1rem; cursor: pointer; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    .card img { width: 100%; height: 160px; object-fit: cover; display: block; background: #f0f0f0; }
    .label { padding: .4rem .6rem; font-weight: 600; text-transform: capitalize; }
    .credit { padding: 0 .6rem .5rem; font-size: .75rem; color: #777; }
    .credit a { color: #777; }
    .empty { padding: .6rem; color: #c00; font-size: .85rem; }
    footer { margin-top: 2rem; font-size: .8rem; color: #999; }
  </style>
</head>
<body>
  <h1>Image Finder</h1>
  <p>Enter up to 5 keywords, separated by commas.</p>

  <div class="controls">
    <input id="keywords" type="text" placeholder="tiger, cat, doctor, skydiving, parachute">
    <button id="go">Find images</button>
  </div>

  <div class="grid" id="results"></div>

  <footer>Photos provided by <a href="https://www.pexels.com">Pexels</a></footer>
  <script src="./app.js"></script>
</body>
</html>
